<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Form Rekam Medis - Terapi Islami</title>

<style>
body{
font-family:Arial;
background:#f4f7fb;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#0b5394;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:20px;
background:#0b5394;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#073763;
}

.note{
margin-top:10px;
color:green;
font-weight:bold;
text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h2>Form Rekam Medis Pasien</h2>

<label>Tanggal Kunjungan</label>
<input type="date" id="tanggal">

<label>Nama Pasien</label>
<input type="text" id="nama">

<label>Umur</label>
<input type="number" id="umur">

<label>Jenis Kelamin</label>
<select id="jk">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

<label>Agama</label>
<input type="text" id="agama">

<label>Keluhan Utama</label>
<textarea id="keluhan"></textarea>

<label>Durasi Keluhan</label>
<input type="text" id="durasi">

<label>Riwayat Penyakit / Operasi</label>
<textarea id="riwayat"></textarea>

<label>Metode Terapi</label>
<select id="terapi">
<option>Bekam</option>
<option>Terapi Fisik</option>
<option>Terapi Titik</option>
<option>PAZ</option>
</select>

<label>Catatan Diagnosa Terapis</label>
<textarea id="diagnosa"></textarea>

<button onclick="buatPrompt()">PROSES & COPY PROMPT</button>

<div class="note" id="status"></div>

</div>

<script>

function buatPrompt(){

var tanggal=document.getElementById("tanggal").value;
var nama=document.getElementById("nama").value;
var umur=document.getElementById("umur").value;
var jk=document.getElementById("jk").value;
var agama=document.getElementById("agama").value;
var keluhan=document.getElementById("keluhan").value;
var durasi=document.getElementById("durasi").value;
var riwayat=document.getElementById("riwayat").value;
var terapi=document.getElementById("terapi").value;
var diagnosa=document.getElementById("diagnosa").value;

var prompt = `
Bertindaklah sebagai tim dokter spesialis multidisiplin yang memiliki pengetahuan luas dari seluruh cabang ilmu kedokteran modern, rehabilitasi medis, nutrisi klinis, kesehatan saraf, kesehatan otot dan sendi, kesehatan metabolisme, kesehatan pencernaan, serta terapi komplementer.

Analisis data pasien berikut secara profesional.

DATA PASIEN

Tanggal Kunjungan : ${tanggal}
Nama Pasien : ${nama}
Umur : ${umur}
Jenis Kelamin : ${jk}
Agama : ${agama}

RIWAYAT MEDIS

Keluhan Utama : ${keluhan}
Durasi Keluhan : ${durasi}
Riwayat Penyakit atau Operasi : ${riwayat}

TERAPI YANG DILAKUKAN

Metode Terapi : ${terapi}

CATATAN DIAGNOSA TERAPIS

${diagnosa}

TUGAS ANDA

Buatkan laporan kesehatan pasien yang sangat lengkap dengan struktur berikut:

1 Ringkasan kondisi pasien

2 Analisis kondisi kesehatan

3 Sistem tubuh yang mungkin terlibat

4 Faktor risiko kesehatan

5 Hubungan dengan diagnosa terapis

6 Penjelasan kondisi untuk pasien

7 Rekomendasi makanan yang dianjurkan

8 Makanan yang perlu dihindari

9 Rekomendasi herbal alami

10 Rekomendasi olahraga dan terapi fisik

11 Rekomendasi terapi lanjutan

12 Hal yang perlu dipantau

13 Pesan edukatif untuk pasien

FORMAT OUTPUT

Buat laporan dalam format PDF dengan header berikut:

Terapi Islami
Ikhtiar Terapi, Kesembuhan dari Allah SWT
Official Website: www.terapiislami.com
WhatsApp: 085276-456789

Di bagian footer juga tampilkan:

Terapis
Abu Khoir, S.Pd., M.Kom.

Tambahkan disclaimer berikut di bagian bawah laporan:

Catatan:
Ini adalah bantuan berpikir berbasis AI, bukan diagnosis pasti.
Gunakan informasi ini hanya sebagai bahan diskusi dengan dokter Anda.
Jika kondisi memburuk, segera cari bantuan medis profesional.
`;

navigator.clipboard.writeText(prompt);

document.getElementById("status").innerHTML="✅ Prompt berhasil dicopy. Silakan paste ke ChatGPT.";

}

</script>

</body>
</html>
