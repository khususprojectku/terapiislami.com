<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Generator Laporan Terapi Islami AI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial, sans-serif;
background:#eef3fb;
padding:30px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:800px;
margin:auto;
box-shadow:0 0 12px rgba(0,0,0,0.15);
}

h2{
text-align:center;
color:#2c5aa0;
}

h3{
margin-top:25px;
color:#2c5aa0;
}

label{
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

textarea{
height:120px;
}

button{
background:#2c5aa0;
color:white;
padding:12px;
border:none;
border-radius:6px;
width:100%;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1f3e73;
}

</style>

</head>

<body>

<div class="container">

<h2>Generator Laporan Terapi Islami AI</h2>

<h3>Data Pasien</h3>

<label>Nomor Rekam Medis</label>
<input id="rm" readonly>

<label>Tanggal Kunjungan</label>
<input type="date" id="tanggal">

<label>Nama Pasien</label>
<input id="nama">

<label>Umur</label>
<input id="umur">

<label>Jenis Kelamin</label>
<select id="jk">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

<label>Agama</label>
<select id="agama">
<option>Islam</option>
<option>Kristen Protestan</option>
<option>Kristen Katolik</option>
<option>Hindu</option>
<option>Budha</option>
<option>Lainnya</option>
</select>

<label>Status Kehamilan</label>
<select id="hamil" onchange="cekHamil()">
<option>Tidak</option>
<option>Ya</option>
</select>

<div id="bulanHamil" style="display:none">

<label>Bulan Kehamilan</label>
<input id="bulan">

</div>

<h3>Pemeriksaan</h3>

<label>Tensi</label>
<input id="tensi">

<label>HB</label>
<input id="hb">

<label>Gula Darah</label>
<input id="gula">

<label>Kolesterol</label>
<input id="kolesterol">

<label>Asam Urat</label>
<input id="urat">

<label>Berat Badan</label>
<input id="bb">

<label>Tinggi Badan</label>
<input id="tb">

<h3>Riwayat Medis</h3>

<label>Keluhan Utama</label>
<textarea id="keluhan"></textarea>

<label>Durasi Keluhan</label>
<input id="durasi">

<label>Riwayat Penyakit / Operasi</label>
<input id="riwayat">

<h3>Terapi</h3>

<label>Metode Terapi</label>
<input id="terapi">

<label>Catatan Terapis</label>
<textarea id="diagnosa"></textarea>

<button onclick="generatePrompt()">Generate Prompt AI</button>

<textarea id="prompt"></textarea>

<button onclick="copyPrompt()">Copy Prompt</button>

<button onclick="buatPDF()">Download Laporan PDF</button>

</div>

<script>

function generateRM(){

let now = new Date()

let timestamp =
now.getFullYear().toString()+
("0"+(now.getMonth()+1)).slice(-2)+
("0"+now.getDate()).slice(-2)+
("0"+now.getHours()).slice(-2)+
("0"+now.getMinutes()).slice(-2)+
("0"+now.getSeconds()).slice(-2)

let random=Math.floor(Math.random()*1000)

return "RM"+timestamp+random

}

window.onload=function(){

document.getElementById("rm").value=generateRM()

let today=new Date().toISOString().split("T")[0]
document.getElementById("tanggal").value=today

}

function cekHamil(){

let hamil=document.getElementById("hamil").value

if(hamil==="Ya"){
document.getElementById("bulanHamil").style.display="block"
}else{
document.getElementById("bulanHamil").style.display="none"
}

}

function generatePrompt(){

let rm=document.getElementById("rm").value
let tanggal=document.getElementById("tanggal").value
let nama=document.getElementById("nama").value
let umur=document.getElementById("umur").value
let jk=document.getElementById("jk").value
let agama=document.getElementById("agama").value

let hamil=document.getElementById("hamil").value
let bulan=document.getElementById("bulan").value

let tensi=document.getElementById("tensi").value
let hb=document.getElementById("hb").value
let gula=document.getElementById("gula").value
let kol=document.getElementById("kolesterol").value
let urat=document.getElementById("urat").value

let bb=document.getElementById("bb").value
let tb=document.getElementById("tb").value

let keluhan=document.getElementById("keluhan").value
let durasi=document.getElementById("durasi").value
let riwayat=document.getElementById("riwayat").value

let terapi=document.getElementById("terapi").value
let diagnosa=document.getElementById("diagnosa").value

let teks=`Bertindaklah sebagai tim dokter spesialis multidisiplin yang memiliki pengetahuan luas dari seluruh cabang ilmu kedokteran modern.

DATA PASIEN

No Rekam Medis : ${rm}
Tanggal : ${tanggal}

Nama : ${nama}
Umur : ${umur}
Jenis Kelamin : ${jk}
Agama : ${agama}

Status Kehamilan : ${hamil}
Bulan Kehamilan : ${bulan}

PEMERIKSAAN

Tensi : ${tensi}
HB : ${hb}
Gula Darah : ${gula}
Kolesterol : ${kol}
Asam Urat : ${urat}

Berat Badan : ${bb}
Tinggi Badan : ${tb}

RIWAYAT MEDIS

Keluhan Utama : ${keluhan}
Durasi Keluhan : ${durasi}
Riwayat Penyakit : ${riwayat}

TERAPI

Metode Terapi : ${terapi}

Catatan Terapis :
${diagnosa}

TUGAS ANDA

1 Ringkasan kondisi pasien
2 Analisis kondisi kesehatan
3 Sistem tubuh yang mungkin terlibat
4 Faktor risiko kesehatan
5 Hubungan dengan diagnosa terapis
6 Penjelasan kondisi untuk pasien
7 Rekomendasi makanan yang dianjurkan
8 Makanan yang perlu dihindari
9 Rekomendasi herbal alami
10 Rekomendasi olahraga dan terapi fisik
11 Rekomendasi terapi lanjutan
12 Hal yang perlu dipantau
13 Pesan edukatif untuk pasien

Buat laporan kesehatan lengkap.`

document.getElementById("prompt").value=teks

}

function copyPrompt(){

let copyText=document.getElementById("prompt")

copyText.select()
document.execCommand("copy")

alert("Prompt berhasil dicopy")

}

async function buatPDF(){

const { jsPDF } = window.jspdf

const doc=new jsPDF()

let y=20

doc.setFontSize(16)
doc.text("Terapi Islami",105,y,null,null,"center")

y+=7
doc.setFontSize(10)
doc.text("Ikhtiar Terapi, Kesembuhan dari Allah SWT",105,y,null,null,"center")

y+=5
doc.text("www.terapiislami.com",105,y,null,null,"center")

y+=5
doc.text("WhatsApp: 085276456789",105,y,null,null,"center")

y+=10

doc.setFontSize(12)
doc.text("DATA PASIEN",20,y)

y+=8

doc.setFontSize(10)

doc.text("Nama : "+document.getElementById("nama").value,20,y);y+=6
doc.text("Umur : "+document.getElementById("umur").value,20,y);y+=6
doc.text("Jenis Kelamin : "+document.getElementById("jk").value,20,y);y+=6
doc.text("Agama : "+document.getElementById("agama").value,20,y);y+=6

doc.text("Status Kehamilan : "+document.getElementById("hamil").value,20,y);y+=6

doc.text("Keluhan : "+document.getElementById("keluhan").value,20,y);y+=6
doc.text("Durasi : "+document.getElementById("durasi").value,20,y);y+=6
doc.text("Riwayat Penyakit : "+document.getElementById("riwayat").value,20,y);y+=6
doc.text("Metode Terapi : "+document.getElementById("terapi").value,20,y);y+=6

y+=12

doc.text("Terapis",150,260)
doc.text("Abu Khoir, S.Pd., M.Kom.",120,266)

doc.setFontSize(8)

doc.text("Ini adalah bantuan berpikir berbasis AI, bukan diagnosis pasti.",20,280)

doc.save("laporan_pasien.pdf")

}

</script>

</body>
</html>
