<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Rekam Medis - Terapi Islami</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#0b5394;
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:15px;
background:#0b5394;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#073763;
}

.table{
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#0b5394;
color:white;
}

.status{
margin-top:10px;
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Sistem Rekam Medis - Terapi Islami</h2>

<label>No Rekam Medis</label>
<input type="text" id="rm" readonly>

<label>Tanggal</label>
<input type="date" id="tanggal">

<label>Nama Pasien</label>
<input type="text" id="nama">

<label>Umur</label>
<input type="number" id="umur">

<label>Jenis Kelamin</label>
<select id="jk">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

<label>Agama</label>
<input type="text" id="agama">

<label>Keluhan Utama</label>
<textarea id="keluhan"></textarea>

<label>Durasi Keluhan</label>
<input type="text" id="durasi">

<label>Riwayat Penyakit</label>
<textarea id="riwayat"></textarea>

<label>Metode Terapi</label>
<select id="terapi">
<option>Bekam</option>
<option>Terapi Fisik</option>
<option>Terapi Titik</option>
<option>PAZ</option>
</select>

<label>Diagnosa Terapis</label>
<textarea id="diagnosa"></textarea>

<button onclick="proses()">Generate Prompt & Copy</button>

<div class="status" id="status"></div>

<div class="table">

<h3>Riwayat Pasien</h3>

<table id="tabel">
<tr>
<th>No RM</th>
<th>Nama</th>
<th>Tanggal</th>
<th>Copy Prompt</th>
</tr>
</table>

</div>

</div>

<script>

function generateRM(){
return "RM-"+Date.now();
}

document.getElementById("rm").value=generateRM();

document.getElementById("tanggal").value=new Date().toISOString().split('T')[0];

loadData();

function proses(){

var rm=document.getElementById("rm").value;
var tanggal=document.getElementById("tanggal").value;
var nama=document.getElementById("nama").value;
var umur=document.getElementById("umur").value;
var jk=document.getElementById("jk").value;
var agama=document.getElementById("agama").value;
var keluhan=document.getElementById("keluhan").value;
var durasi=document.getElementById("durasi").value;
var riwayat=document.getElementById("riwayat").value;
var terapi=document.getElementById("terapi").value;
var diagnosa=document.getElementById("diagnosa").value;

var prompt=`
Bertindaklah sebagai tim dokter spesialis multidisiplin yang memiliki pengetahuan luas dari seluruh cabang ilmu kedokteran modern.

DATA PASIEN

No Rekam Medis : ${rm}
Tanggal : ${tanggal}
Nama Pasien : ${nama}
Umur : ${umur}
Jenis Kelamin : ${jk}
Agama : ${agama}

Keluhan Utama : ${keluhan}
Durasi Keluhan : ${durasi}
Riwayat Penyakit : ${riwayat}

Metode Terapi : ${terapi}

Diagnosa Terapis :
${diagnosa}

Buat laporan kesehatan lengkap dalam format PDF.

HEADER

Terapi Islami
Ikhtiar Terapi, Kesembuhan dari Allah SWT
Official Website: www.terapiislami.com
WhatsApp: 085276-456789

Logo:
https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhfzvRuv2EmBUdExyNh6-bzYM2cpsiB2SAbkawzsyMXrxbuLcPF6Fi0WGN7W9rMDn-T_vAfiTpLHW6OwyqpC3HB7izcFHpRQIDf_YLzzsvtEz2kUBxgMde2Pm5zBYGrVcqAnS1gIFMCrePzUUhtEDznNgq7HfHlef9jDywF8payqZxqppecXPKj57MWNxO6/s1024/1000159180.png

Di bagian footer juga tampilkan:

Terapis
Abu Khoir, S.Pd., M.Kom.

QR Code:
https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhFisc4nbYWXnxmsOy3HkTD6R9CHTEuXfUOLJf3MzT9jvdSnhNJYvtSp8T8M444CN0LYyu4pjd7GWSxUUBYmR6oB4wxmKTo17QwbBj69xuVU1eTBqQN5thSqFSo7AYUyLkGbPA9zYYWj0q6Wk78cXXGVSRqaaYQWzCqIMrP-Dj7a3-84AtyvAkSIT-9NF70/s1147/1000159312.png

Disclaimer:

Ini adalah bantuan berpikir berbasis AI, bukan diagnosis pasti.
Gunakan informasi ini hanya sebagai bahan diskusi dengan dokter Anda.
Jika kondisi memburuk segera cari bantuan medis profesional.
`;

navigator.clipboard.writeText(prompt);

document.getElementById("status").innerHTML="Prompt berhasil dicopy.";

var data=JSON.parse(localStorage.getItem("pasien")||"[]");

data.push({rm,nama,tanggal,prompt});

localStorage.setItem("pasien",JSON.stringify(data));

loadData();

}

function loadData(){

var tabel=document.getElementById("tabel");

var data=JSON.parse(localStorage.getItem("pasien")||"[]");

tabel.innerHTML="<tr><th>No RM</th><th>Nama</th><th>Tanggal</th><th>Copy Prompt</th></tr>";

data.forEach((p,i)=>{

var row=tabel.insertRow();

row.insertCell(0).innerHTML=p.rm;
row.insertCell(1).innerHTML=p.nama;
row.insertCell(2).innerHTML=p.tanggal;
row.insertCell(3).innerHTML="<button onclick='copyPrompt("+i+")'>Copy</button>";

});

}

function copyPrompt(i){

var data=JSON.parse(localStorage.getItem("pasien"));

navigator.clipboard.writeText(data[i].prompt);

alert("Prompt dicopy kembali");

}

</script>

</body>
</html>
