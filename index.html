<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Rekam Medis - Terapi Islami</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#0b5394;
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:15px;
background:#0b5394;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#073763;
}

.table{
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#0b5394;
color:white;
}

.status{
margin-top:10px;
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Sistem Rekam Medis - Terapi Islami</h2>

<label>No Rekam Medis</label>
<input type="text" id="rm" readonly>

<label>Tanggal</label>
<input type="date" id="tanggal">

<label>Nama Pasien</label>
<input type="text" id="nama">

<label>Umur</label>
<input type="number" id="umur">

<label>Jenis Kelamin</label>
<select id="jk">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

<label>Agama</label>
<input type="text" id="agama">

<label>Keluhan Utama</label>
<textarea id="keluhan"></textarea>

<label>Durasi Keluhan</label>
<input type="text" id="durasi">

<label>Riwayat Penyakit</label>
<textarea id="riwayat"></textarea>

<label>Metode Terapi</label>
<select id="terapi">
<option>Bekam</option>
<option>Terapi Fisik</option>
<option>Terapi Titik</option>
<option>PAZ</option>
</select>

<label>Diagnosa Terapis</label>
<textarea id="diagnosa"></textarea>

<button onclick="proses()">Generate Prompt & Copy</button>

<div class="status" id="status"></div>

<div class="table">

<h3>Riwayat Pasien</h3>

<table id="tabel">
<tr>
<th>No RM</th>
<th>Nama</th>
<th>Tanggal</th>
<th>Copy Prompt</th>
</tr>
</table>

</div>

</div>

<script>

function generateRM(){
return "RM-"+Date.now();
}

document.getElementById("rm").value=generateRM();

document.getElementById("tanggal").value=new Date().toISOString().split('T')[0];

loadData();

function proses(){

var rm=document.getElementById("rm").value;
var tanggal=document.getElementById("tanggal_kunjungan").value;
var nama=document.getElementById("nama_pasien").value;
var umur=document.getElementById("umur").value;
var jk=document.getElementById("jenis_kelamin").value;
var agama=document.getElementById("agama").value;
var keluhan=document.getElementById("keluhan_utama").value;
var durasi=document.getElementById("durasi_keluhan").value;
var riwayat=document.getElementById("riwayat_penyakit").value;
var terapi=document.getElementById("metode_terapi").value;
var diagnosa=document.getElementById("diagnosa_terapis").value;

var prompt=`
Anda bertindak sebagai tim dokter spesialis multidisiplin yang memiliki pengetahuan luas dari seluruh cabang ilmu kedokteran modern, kesehatan preventif, rehabilitasi medis, nutrisi klinis, kesehatan saraf, kesehatan otot dan sendi, metabolisme tubuh, kesehatan pencernaan, kesehatan mental, serta berbagai pendekatan terapi komplementer dan kesehatan holistik.

Anda mampu menganalisis kondisi pasien secara menyeluruh dan memberikan rekomendasi terapi, pola hidup sehat, serta program pemulihan kesehatan.

Analisislah data pasien berikut secara objektif, profesional, dan komprehensif.

DATA PASIEN

Tanggal Kunjungan : {{tanggal_kunjungan}}
Nama Pasien : {{nama_pasien}}
Umur : {{umur}}
Jenis Kelamin : {{jenis_kelamin}}
Agama : {{agama}}

RIWAYAT MEDIS

Keluhan Utama : {{keluhan_utama}}
Durasi Keluhan : {{durasi_keluhan}}
Riwayat Penyakit atau Operasi : {{riwayat_penyakit}}

TERAPI YANG DILAKUKAN

Metode Terapi :
{{metode_terapi}}

CATATAN DIAGNOSA TERAPIS

{{diagnosa_terapis}}

TUGAS ANDA

Berdasarkan data tersebut, buatkan laporan kesehatan pasien secara lengkap dengan struktur berikut.

1. RINGKASAN KONDISI PASIEN
Tuliskan ringkasan kondisi pasien secara singkat dan jelas.

2. ANALISIS KONDISI KESEHATAN
Jelaskan kemungkinan penyebab keluhan pasien dari berbagai sudut pandang medis.

3. SISTEM TUBUH YANG TERLIBAT
Jelaskan sistem tubuh yang kemungkinan terlibat seperti:
sistem saraf
sistem otot dan sendi
sistem pencernaan
sistem metabolisme
sistem hormon
sistem kardiovaskular
atau sistem tubuh lainnya.

4. FAKTOR RISIKO
Jelaskan faktor yang dapat memperburuk kondisi pasien seperti:
pola makan
kurang aktivitas
stres
kurang tidur
postur tubuh buruk
kebiasaan harian

5. HUBUNGAN DENGAN DIAGNOSA TERAPIS
Jelaskan hubungan antara keluhan pasien dan diagnosa yang diberikan oleh terapis.

6. PENJELASAN KONDISI UNTUK PASIEN
Berikan penjelasan sederhana agar pasien memahami kondisi tubuhnya.

7. REKOMENDASI MAKANAN
Buat daftar makanan yang dianjurkan untuk membantu pemulihan pasien.

8. MAKANAN YANG PERLU DIHINDARI
Buat daftar makanan yang dapat memperburuk kondisi pasien.

9. REKOMENDASI HERBAL ALAMI
Jika relevan, berikan rekomendasi herbal alami yang aman seperti:
madu
jahe
kunyit
habbatussauda
atau herbal lainnya.

10. SARAN OLAHRAGA DAN TERAPI FISIK
Berikan rekomendasi aktivitas fisik yang aman seperti:
peregangan
jalan kaki
latihan ringan
latihan postur tubuh

11. REKOMENDASI TERAPI
Jelaskan bagaimana metode terapi yang dilakukan dapat membantu pemulihan pasien.

12. HAL YANG PERLU DIPANTAU
Sebutkan gejala yang perlu diperhatikan oleh pasien.

13. PESAN EDUKATIF UNTUK PASIEN
Tuliskan pesan motivasi kesehatan agar pasien lebih disiplin menjaga kesehatannya.
`;

navigator.clipboard.writeText(prompt);

document.getElementById("status").innerHTML="Prompt berhasil dicopy.";

var data=JSON.parse(localStorage.getItem("pasien")||"[]");

data.push({rm,nama,tanggal,prompt});

localStorage.setItem("pasien",JSON.stringify(data));

loadData();

}

function loadData(){

var tabel=document.getElementById("tabel");

var data=JSON.parse(localStorage.getItem("pasien")||"[]");

tabel.innerHTML="<tr><th>No RM</th><th>Nama</th><th>Tanggal</th><th>Copy Prompt</th></tr>";

data.forEach((p,i)=>{

var row=tabel.insertRow();

row.insertCell(0).innerHTML=p.rm;
row.insertCell(1).innerHTML=p.nama;
row.insertCell(2).innerHTML=p.tanggal;
row.insertCell(3).innerHTML="<button onclick='copyPrompt("+i+")'>Copy</button>";

});

}

function copyPrompt(i){

var data=JSON.parse(localStorage.getItem("pasien"));

navigator.clipboard.writeText(data[i].prompt);

alert("Prompt dicopy kembali");

}

</script>

</body>
</html>
